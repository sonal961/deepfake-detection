<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detection</title>
</head>
<body>

<h2>Upload Image</h2>

<form action="/predict" method="POST" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Detect</button>
</form>

{% if prediction %}
    <h2>Result: {{ prediction }}</h2>
{% endif %}

</body>
</html>
